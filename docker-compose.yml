name: pixfetch

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      FRONTEND_URL: ${APP_URL}
      API_BASE_URL: ${APP_URL}
      DOWNLOADS_DIR: /data/downloads
      COOKIE_SECURE: "true"
    volumes:
      - downloads:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/api/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - pixfetch

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_PROXY_URL: http://api:8000
    environment:
      API_PROXY_URL: http://api:8000
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pixfetch

volumes:
  downloads:

networks:
  pixfetch:
    driver: bridge
